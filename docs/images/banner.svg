<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- AGENTS.md file icon -->
  <g transform="translate(55, 45)">
    <!-- Document shape -->
    <rect x="0" y="0" width="62" height="85" rx="6" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <!-- Folded corner -->
    <path d="M44,0 L62,18 L44,18 Z" fill="rgba(255,255,255,0.15)" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <!-- "AGENTS" label -->
    <text x="8" y="42" font-family="monospace" font-size="10" font-weight="700" fill="#ffffff" opacity="0.85">AGENTS</text>
    <text x="8" y="54" font-family="monospace" font-size="10" font-weight="700" fill="#D97757" opacity="0.9">.md</text>
    <!-- Content lines -->
    <rect x="8" y="62" width="44" height="3" rx="1.5" fill="#ffffff" opacity="0.25"/>
    <rect x="8" y="70" width="32" height="3" rx="1.5" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Upward arrow (walk-up concept) -->
  <g transform="translate(133, 60)">
    <path d="M0,65 L0,15" stroke="url(#arrow)" stroke-width="2.5" stroke-dasharray="5,3" stroke-linecap="round"/>
    <polygon points="-6,18 0,4 6,18" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Claude Code terminal icon -->
  <g transform="translate(147, 50)">
    <rect x="0" y="0" width="55" height="42" rx="5" fill="url(#glow)" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <!-- Terminal prompt -->
    <text x="8" y="18" font-family="monospace" font-size="11" fill="#D97757" opacity="0.9">&gt;_</text>
    <!-- Cursor blink -->
    <rect x="28" y="10" width="7" height="12" rx="1" fill="#ffffff" opacity="0.4"/>
    <!-- Output line -->
    <rect x="8" y="28" width="36" height="3" rx="1.5" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="240" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">
    cc-agents-md
  </text>

  <!-- Subtitle -->
  <text x="242" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Load AGENTS.md into Claude Code sessions automatically
  </text>

  <!-- Tag line -->
  <text x="242" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.4">
    No CLAUDE.md  |  Pure bash runtime  |  Walk-up discovery  |  Zero dependencies
  </text>

  <!-- Decorative: stacked AGENTS.md files on right (monorepo hint) -->
  <g transform="translate(750, 35)" opacity="0.12">
    <rect x="0" y="0" width="50" height="35" rx="4" fill="#ffffff"/>
    <rect x="6" y="8" width="26" height="3" rx="1.5" fill="#D97757"/>
    <rect x="6" y="16" width="38" height="3" rx="1.5" fill="#D97757" opacity="0.6"/>
    <rect x="6" y="24" width="20" height="3" rx="1.5" fill="#D97757" opacity="0.4"/>

    <rect x="15" y="45" width="50" height="35" rx="4" fill="#ffffff" opacity="0.7"/>
    <rect x="21" y="53" width="26" height="3" rx="1.5" fill="#D97757" opacity="0.5"/>
    <rect x="21" y="61" width="38" height="3" rx="1.5" fill="#D97757" opacity="0.4"/>

    <rect x="30" y="90" width="50" height="35" rx="4" fill="#ffffff" opacity="0.5"/>
    <rect x="36" y="98" width="26" height="3" rx="1.5" fill="#D97757" opacity="0.4"/>
    <rect x="36" y="106" width="38" height="3" rx="1.5" fill="#D97757" opacity="0.3"/>
  </g>
</svg>
